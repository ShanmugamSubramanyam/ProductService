version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17 # Use corretto8, corretto11, or corretto21 based on your project
  
  pre_build:
    commands:
      - echo "Setting up Gradle permissions..."
      - chmod +x gradlew
      - echo "Logged in to $(date)"

  build:
    commands:
      - echo "Build started on $(date)"
      - ./gradlew clean build # Runs tests and packages the application

  post_build:
    commands:
      - echo "Build completed on $(date)"

artifacts:
  files:
    - 'build/libs/*.jar' # Collects the generated executable jar
  discard-paths: yes # Flattens the file structure in the output bucket
